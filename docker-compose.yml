services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports:
      # Host 5435 keeps out of the way of a local Postgres on 5432.
      # Override with DB_PORT if 5435 is busy.
      - "${DB_PORT:-5435}:5432"
    volumes:
      - ledger-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ledger"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Talks to the db service over the compose network
      DATABASE_URL: postgresql://postgres:ledger@db:5432/ledger
      NODE_ENV: production
    ports:
      # Override with APP_PORT if 3000 is busy, e.g. APP_PORT=3010 docker compose up --build
      - "${APP_PORT:-3000}:3000"

volumes:
  ledger-pgdata:
